services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpthub
    env_file:
      - .env
    volumes:
      - open-webui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  open-webui: {}
